<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa UFJ</title>

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1Ijoiam9hb2xtcHYiLCJhIjoiY21tcnpzb2VjMWg0azJ0cTJhdDRpNzI2NSJ9.k5y7ae6ZmEbO7SKghZztfA';

  const bounds = [
    [-51.7220, -17.9310], // SW - canto inferior esquerdo do campus
    [-51.7100, -17.9185]  // NE - canto superior direito do campus
];

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/joaolmpv/cmms0809o001601s3cttu2kab',
    center: [-51.7161, -17.9248], // ← Centro exato do campus UFJ
    zoom: 16.5,
    pitch: 45,
    bearing: -20,
    maxBounds: bounds
});
        map.on('click', 'mapa UFJ', (e) => {
            const nomePredio = e.features[0].properties.name || "Prédio da UFJ";
            new mapboxgl.Popup()
                .setLngLat(e.lngLat)
                .setHTML(`<div style="padding:5px;"><strong>${nomePredio}</strong></div>`)
                .addTo(map);
        });

        const layersInterativas = ['mapa UFJ'];
        layersInterativas.forEach(layer => {
            map.on('mouseenter', layer, () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', layer, () => {
                map.getCanvas().style.cursor = '';
            });
        });
    </script>

</body>
</html>
