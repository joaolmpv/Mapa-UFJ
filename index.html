<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoiam9hb2xtcHYiLCJhIjoiY21tcnpzb2VjMWg0azJ0cTJhdDRpNzI2NSJ9.k5y7ae6ZmEbO7SKghZztfA';

    const bounds = [
        [-51.7220, -17.9310],
        [-51.7100, -17.9185]
    ];

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/joaolmpv/cmms0809o001601s3cttu2kab',
        center: [-51.7161, -17.9248],
        zoom: 16.5,
        minZoom: 15.5,
        maxZoom: 19,
        pitch: 20,        // ← reduzido de 45 para 20 (prédios colam no chão)
        bearing: -20,
        maxBounds: bounds
    });

    map.on('load', () => {

        // Força exibição dos nomes das ruas do seu estilo personalizado
        map.setLayoutProperty('road-label', 'visibility', 'visible');
        map.setLayoutProperty('road-label', 'text-field', ['get', 'name']);

        // Estiliza os labels das ruas
        map.setPaintProperty('road-label', 'text-color', '#333333');
        map.setPaintProperty('road-label', 'text-halo-color', '#ffffff');
        map.setPaintProperty('road-label', 'text-halo-width', 2);
    });

    // Popup ao clicar nos prédios
    map.on('click', 'mapa UFJ', (e) => {
        const nomePredio = e.features[0].properties.name || "Prédio da UFJ";
        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(`<div style="padding:5px;"><strong>${nomePredio}</strong></div>`)
            .addTo(map);
    });

    // Cursor mãozinha ao passar nos prédios
    const layersInterativas = ['mapa UFJ'];
    layersInterativas.forEach(layer => {
        map.on('mouseenter', layer, () => {
            map.getCanvas().style.cursor = 'pointer';
        });
        map.on('mouseleave', layer, () => {
            map.getCanvas().style.cursor = '';
        });
    });
</script>
